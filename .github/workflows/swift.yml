name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # 1. SwiftLint — работает на любом Xcode
  # ──────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  build:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: |
          xcodebuild build \
            -project mowa.xcodeproj \
            -scheme Verbum \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.0' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | grep -E "error:|warning:|BUILD (SUCCEEDED|FAILED)" | tail -30

      - name: Test
        run: |
          xcodebuild test \
            -project mowa.xcodeproj \
            -scheme Verbum \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.0' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | grep -E "error:|Test (Suite|Case|Passed|Failed)|BUILD (SUCCEEDED|FAILED)" | tail -50
