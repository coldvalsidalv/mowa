name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # 1. SwiftLint — работает на любом Xcode
  # ──────────────────────────────────────────────
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  # ──────────────────────────────────────────────
  # 2. Build — требует Xcode 26 (iOS 26 target)
  #    GitHub-hosted runners получат Xcode 26
  #    ориентировочно осень 2025.
  #    До этого шаг компилируется но может падать
  #    из-за отсутствия iOS 26 SDK.
  # ──────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available --json | python3 -c "
import json, sys
d = json.load(sys.stdin)
for runtime, devices in d['devices'].items():
    iphones = [dev['name'] for dev in devices if 'iPhone' in dev['name'] and dev['isAvailable']]
    if iphones:
        print(f'{runtime}: {iphones[:2]}')
"

      - name: Build
        run: |
          xcodebuild build \
            -project mowa.xcodeproj \
            -scheme Verbum \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | grep -E "error:|warning:|BUILD (SUCCEEDED|FAILED)" | tail -30

      - name: Test
        run: |
          SIMULATOR=$(xcrun simctl list devices available -j | python3 -c "
import json, sys
d = json.load(sys.stdin)
for runtime in sorted(d['devices'].keys(), reverse=True):
    iphones = [dev for dev in d['devices'][runtime] if 'iPhone' in dev['name'] and dev['isAvailable']]
    if iphones:
        print(iphones[0]['udid'])
        break
")
          echo "Using simulator: $SIMULATOR"
          xcodebuild test \
            -project mowa.xcodeproj \
            -scheme Verbum \
            -destination "id=$SIMULATOR" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | grep -E "error:|Test (Suite|Case|Passed|Failed)|BUILD (SUCCEEDED|FAILED)" | tail -50
