included:
  - Views
  - ViewModels
  - Services
  - Models
  - Utils

excluded:
  - .claude
  - backend
  - mowaTests

disabled_rules:
  - trailing_whitespace                      # Xcode сам расставляет
  - line_length                              # SwiftUI-код естественно длинный
  - type_body_length                         # крупные View-файлы допустимы
  - file_length                              # компоненты могут быть в одном файле
  - function_body_length                     # buildBody в SwiftUI длинный по природе
  - cyclomatic_complexity                    # FSRS математика сложная
  - multiple_closures_with_trailing_closure  # стандартный SwiftUI стиль
  - large_tuple                              # APIClient использует большие туплы
  - trailing_comma                           # нормально в многострочных литералах
  - implicit_optional_initialization        # var x: T? = nil — явно лучше
  - vertical_whitespace                      # форматирование на усмотрение автора

opt_in_rules:
  - empty_count               # .count == 0 → .isEmpty
  - private_outlet            # @IBOutlet должен быть private

function_name:
  excluded:
    - L                       # локализационный хелпер L("key")

identifier_name:
  min_length:
    error: 1                  # разрешаем i, j, x, y в циклах/замыканиях
    warning: 1
  excluded:
    - id                      # SwiftUI/SwiftData стандарт
    - xp                      # доменный термин
    - r                       # FSRS: retrievability
    - s                       # FSRS: stability
    - d                       # FSRS: difficulty
    - t                       # FSRS: time
    - w                       # FSRS: weight
    - i                       # цикл-счётчик
    - p                       # APIClient: page counter / pagination
    - x                       # геометрия: координата X
    - y                       # геометрия: координата Y
    - c                       # CodingKeys container
    - f                       # DateFormatter локал
  allowed_symbols: "_"        # разрешаем snake_case (API-модели)
