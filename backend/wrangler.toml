name = "verbum-backend"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[dev]
ip = "0.0.0.0"
port = 8787

# Google iOS OAuth client ID for social sign-in (not a secret — embedded in the app).
# For local dev the same variable lives in .dev.vars.
[vars]
GOOGLE_IOS_CLIENT_ID = "690760115922-ps0iul156lu6b3aer0uabhma01a0k8a7.apps.googleusercontent.com"

[[d1_databases]]
binding = "PRIMARY_DB"
database_name = "verbum"
database_id = "2ec60272-470d-4b99-a87d-00dc5ea5d1eb"
migrations_dir = "migrations"

# Fail-safe counter for the writing rate limit when D1 is unavailable.
# Read defensively in kvOverDailyLimit — the worker still runs if this is absent.
[[kv_namespaces]]
binding = "WRITING_RL"
id = "d4e2c2246ec6450c91a8ba25a2420544"

[[r2_buckets]]
binding = "TTS_BUCKET"
bucket_name = "verbum-tts"
